server {
    listen 80;

    location = / {
        return 301 /identity_reflection/;
    }

    location /identity_reflection/ {
        alias /usr/share/nginx/html/identity_reflection/;
        index index.html;
        try_files $uri $uri/ /identity_reflection/index.html;
    }

    error_page 404 /identity_reflection/index.html;
}
